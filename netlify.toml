# Netlify configuration — static site, no build step.
# The whole repository root is published as-is.

[build]
  publish = "."
  command = ""

# Serve privacy.html at the clean /privacy path the footer links to.
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

# Long-lived, safe-to-cache assets (stable filenames).
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS/JS use stable (non-hashed) names, so revalidate rather than cache hard.
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Service worker files must never be cached, so browsers always re-fetch the
# self-destruct version and unregister the old worker promptly.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

# Sensible baseline security headers for every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
